worker_processes auto;

events {
    worker_connections 1024;
}

http {

    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    keepalive_timeout 65;

    client_max_body_size 100m;

    # Enable gzip compression
    gzip on;

    # Minimum file size in bytes to compress (prevents tiny files from getting larger)
    gzip_min_length 256;

    # Compression level (1-9). 5 is the sweet spot for CPU usage and compression ratio
    gzip_comp_level 5;

    # Compress data even for proxies, essential for CDNs and AWS CloudFront
    gzip_proxied any;

    # Tell proxies to cache both the gzipped and non-gzipped versions
    gzip_vary on;

    # List of MIME types to compress
    gzip_types 
        text/plain 
        text/css 
        text/javascript 
        application/javascript 
        application/json 
        application/xml 
        application/xml+rss 
        image/svg+xml;

    # Disable for older browsers known to have issues with gzipped content
    gzip_disable "MSIE [1-6]\.";

    # upstream auth service
    upstream auth_service {
        server golang-auth:8089;
    }

    # upstream api service
    upstream api_service {
        server quarkus-3-33-api:8081;
    }

    # upstream core service
    upstream core_service {
        server spring-3-5-core:8082;
    }

    server {

        listen 80;
        server_name svn.rune.ru;

        location / {
            root /usr/share/nginx/html;
            index  index.html index.htm;
        }

        #
        # AUTH SERVICE
        #
        location /auth/api/ {

            # upstream api service
            proxy_pass http://auth_service;

            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        #
        # API SERVICE
        #
        location /api/ {

            # upstream auth service
            proxy_pass http://api_service;

            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        #
        # CORE SERVICE
        #
        location /core/api/ {

            proxy_pass http://core_service;

            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        #
        # HEALTHCHECK
        #
        location /health {
            return 200 'nginx ok';
            add_header Content-Type text/plain;
        }

        location /2019/ {
            alias /usr/share/nginx/html/2019/;
        }

        location /2023/ {
            alias /usr/share/nginx/html/2023/;
        }

        location /2026/ {
            alias /usr/share/nginx/html/2026/;
        }
    }
}
