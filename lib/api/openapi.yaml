      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Authentication
paths:
  /api/v2/record/blob:
    put:
      summary: Update BLOB record
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBlobRecord"
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResourceBlobRecord"
        "500":
          $ref: "#/components/responses/500Error"
        "401":
          description: Not Authorized
        "403":
          description: Not Allowed
        "400":
          description: Bad Request
      tags:
      - Blob Record Resource
      security:
      - SecurityScheme:
        - USER
    post:
      summary: Create BLOB record
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewBlobRecord"
        required: true
