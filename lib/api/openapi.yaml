          $ref: "#/components/schemas/UUID"
        title:
          type: string
        json:
          type: object
          additionalProperties:
            type: string
        postAt:
          $ref: "#/components/schemas/OffsetDateTime"
        tags:
          type: array
          uniqueItems: true
