app:
  api:
    logging:
      enable: true
      url-patterns: "/core/api/*"
      request-id-header-name: X-Request-ID

logging:
  level:
    root: INFO
  pattern:
    console: "%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){faint} %clr(${LOG_LEVEL_PATTERN:%-5p}) %clr(${PID:- }){magenta} %clr(-){faint} %clr([%20.-20t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %X{REQUEST_ID} %m%n${LOG_EXCEPTION_CONVERSION_WORD:%wEx}"

spring:
  application:
    name: core
  datasource:
    url: ${CORE_SERVER_DB_URL:jdbc:postgresql://localhost:5432/db}
    username: ${CORE_SERVER_DB_USERNAME:dbuser}
    password: ${CORE_SERVER_DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false

server:
  host: ${CORE_SERVER_HTTP_HOST:127.0.0.1}
  port: ${CORE_SERVER_HTTP_PORT:8082}

token:
  signing:
    key: ${CORE_SERVER_TOKEN_SIGNING_KEY:Y2Q4ZjVmOWYtZTNlOC01NjlmLTg3ZWYtZjAzYzZjZmMyOWJj}
