application.auth-server-connect-timeout=${API_SERVER_AUTH_SERVER_CONNECT_TIMEOUT:900}
application.auth-server-read-timeout=${API_SERVER_AUTH_SERVER_READ_TIMEOUT:500}
application.auth-server-url=${API_SERVER_AUTH_SERVER_URL:${remote.auth-server-url}}
application.external-jwt-api-key-prefix=${API_SERVER_AUTH_EXTERNAL_JWT_API_KEY_PREFIX:Bearer}
application.verify-issuer=cd8f5f9f-e3e8-569f-87ef-f03c6cfc29bc
application.external-jwt-verify-key-hmac=${API_SERVER_JWT_EXTERNAL_VERIFY_KEY_HMAC:${application.verify-issuer}}

quarkus.datasource.db-kind=postgresql
quarkus.datasource.password=${API_SERVER_CORE_DB_PASSWORD:password}
quarkus.datasource.reactive.max-size=20
quarkus.datasource.reactive.url=${API_SERVER_CORE_DB_REACTIVE_URL:vertx-reactive:postgresql://localhost:5432/db?application_name=api&currentSchema=api&loggerLevel=TRACE}
quarkus.datasource.username=${API_SERVER_CORE_DB_USERNAME:dbuser}
quarkus.http.auth.propagate-security-identity=true

quarkus.hibernate-orm.blocking=false
quarkus.hibernate-orm.fetch.batch-size=1024
quarkus.hibernate-orm.mapping.format.global=ignore

quarkus.jackson.write-dates-as-timestamps=false

quarkus.rest-client."su.svn.api.repository.client.rest.JsonRecordClient".url=${API_SERVER_CORE_SERVER_ADDRESS:${remote.core-server-address}}
quarkus.rest-client."su.svn.api.repository.client.rest.RecordViewClient".url=${API_SERVER_CORE_SERVER_ADDRESS:${remote.core-server-address}}

mp.jwt.verify.issuer=${API_SERVER_CORE_VERIFY_ISSUER:${application.verify-issuer}}
smallrye.jwt.time-to-live=-1

remote.auth-server-url=http://localhost:64148/auth/api
remote.core-server-address=http://localhost:8081
