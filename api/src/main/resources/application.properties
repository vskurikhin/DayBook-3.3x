app.api.request-id-header-name=X-Request-ID
app.external-jwt-api-key-prefix=${API_SERVER_AUTH_EXTERNAL_JWT_API_KEY_PREFIX:Bearer}
app.external-jwt-verify-key-hmac=${API_SERVER_JWT_EXTERNAL_VERIFY_KEY_HMAC:cd8f5f9f-e3e8-569f-87ef-f03c6cfc29bc}
# base64 Y2Q4ZjVmOWYtZTNlOC01NjlmLTg3ZWYtZjAzYzZjZmMyOWJj
app.verify-issuer=cd8f5f9f-e3e8-569f-87ef-f03c6cfc29bc
application.auth-server-connect-timeout=${API_SERVER_AUTH_SERVER_CONNECT_TIMEOUT:900}
application.auth-server-read-timeout=${API_SERVER_AUTH_SERVER_READ_TIMEOUT:500}

quarkus.datasource.db-kind=postgresql
quarkus.datasource.password=${API_SERVER_CORE_DB_PASSWORD:password}
quarkus.datasource.reactive.max-size=20
quarkus.datasource.reactive.url=${API_SERVER_CORE_DB_REACTIVE_URL:vertx-reactive:postgresql://localhost:5432/db?application_name=api&currentSchema=api&loggerLevel=TRACE}
quarkus.datasource.username=${API_SERVER_CORE_DB_USERNAME:dbuser}

quarkus.hibernate-orm.blocking=false
quarkus.hibernate-orm.fetch.batch-size=1024
quarkus.hibernate-orm.json.format-mapper=jackson
quarkus.hibernate-orm.mapping.format.global=ignore

quarkus.http.access-log.enabled=true
# quarkus.http.access-log.pattern="%t - %a - %r - %s - %Ts"
quarkus.http.auth.propagate-security-identity=true
quarkus.http.error-pages.show-stack=false

quarkus.jackson.write-dates-as-timestamps=false

quarkus.native.additional-build-args=--initialize-at-run-time=org.hibernate.type.format.jakartajson.JakartaJsonIntegration
# ,--initialize-at-run-time=io.jsonwebtoken.impl.security.Randoms

quarkus.log.console.format=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5p %i - [%20.-20t] %-40.40c{2.} : %X{REQUEST_ID} %s%n
quarkus.log.level=INFO

quarkus.rest-client."su.svn.api.repository.client.rest.AuthRolesClient".url=${API_SERVER_AUTH_SERVER_ADDRESS:${remote.auth-server-address}}
quarkus.rest-client."su.svn.api.repository.client.rest.BlobRecordClient".url=${API_SERVER_CORE_SERVER_ADDRESS:${remote.core-server-address}}
quarkus.rest-client."su.svn.api.repository.client.rest.JsonRecordClient".url=${API_SERVER_CORE_SERVER_ADDRESS:${remote.core-server-address}}
quarkus.rest-client."su.svn.api.repository.client.rest.MarkdownRecordClient".url=${API_SERVER_CORE_SERVER_ADDRESS:${remote.core-server-address}}
quarkus.rest-client."su.svn.api.repository.client.rest.RecordViewClient".url=${API_SERVER_CORE_SERVER_ADDRESS:${remote.core-server-address}}
quarkus.rest-client."su.svn.api.repository.client.rest.SetRecordClient".url=${API_SERVER_CORE_SERVER_ADDRESS:${remote.core-server-address}}
quarkus.rest-client."su.svn.api.repository.client.rest.ValueRecordClient".url=${API_SERVER_CORE_SERVER_ADDRESS:${remote.core-server-address}}
quarkus.rest-client."su.svn.api.repository.client.rest.VectorRecordClient".url=${API_SERVER_CORE_SERVER_ADDRESS:${remote.core-server-address}}
quarkus.rest-client."su.svn.api.repository.client.rest.XmlRecordClient".url=${API_SERVER_CORE_SERVER_ADDRESS:${remote.core-server-address}}

mp.jwt.verify.algorithm=HS256
mp.jwt.verify.issuer=${API_SERVER_CORE_VERIFY_ISSUER:${app.verify-issuer}}

smallrye.jwt.sign.key=${API_SERVER_JWT_EXTERNAL_VERIFY_KEY_HMAC:${app.external-jwt-verify-key-hmac}}
smallrye.jwt.time-to-live=-1
smallrye.jwt.verify.algorithm=HS256
smallrye.jwt.verify.issuer=${API_SERVER_CORE_VERIFY_ISSUER:${app.verify-issuer}}
smallrye.jwt.verify.key=${API_SERVER_JWT_EXTERNAL_VERIFY_KEY_HMAC:${app.external-jwt-verify-key-hmac}}
smallrye.jwt.verify.secretkey=${API_SERVER_JWT_EXTERNAL_VERIFY_KEY_HMAC:${app.external-jwt-verify-key-hmac}}

remote.auth-server-address=http://localhost:64148
remote.auth-server-url=http://localhost:64148/auth/api
remote.core-server-address=http://localhost:8081
