quarkus.openapi.generator.spec=openapi.yml
quarkus.quinoa.package-manager-install.node-version=20.10.0
quarkus.quinoa.package-manager-install=true
quarkus.quinoa.ui-root-path=quinoa
quarkus.hibernate-orm.blocking=false
quarkus.hibernate-orm.mapping.format.global=ignore
quarkus.jackson.write-dates-as-timestamps=false
quarkus.hibernate-orm.fetch.batch-size=1024
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=dbuser
quarkus.datasource.password=password
quarkus.datasource.reactive.url=vertx-reactive:postgresql://localhost:5432/db?application_name=api&currentSchema=api&loggerLevel=TRACE
quarkus.datasource.reactive.max-size=20
quarkus.rest-client."su.svn.api.repository.client.rest.RecordViewClient".url=http://localhost:8081