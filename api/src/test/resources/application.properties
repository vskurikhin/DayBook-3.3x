application.auth-server-connect-timeout=${API_SERVER_AUTH_SERVER_CONNECT_TIMEOUT:900}
application.auth-server-read-timeout=${API_SERVER_AUTH_SERVER_READ_TIMEOUT:500}
application.auth-server-url=${API_SERVER_AUTH_SERVER_URL:${remote.auth-server-url}}
application.external-jwt-api-key-prefix=${API_SERVER_AUTH_EXTERNAL_JWT_API_KEY_PREFIX:Bearer}
application.verify-issuer=cd8f5f9f-e3e8-569f-87ef-f03c6cfc29bc
application.external-jwt-verify-key-hmac=12345678901234567890123456789012

# Enable Liquibase to run on startup
quarkus.liquibase.migrate-at-start=true
quarkus.hibernate-orm.database.generation=none
quarkus.liquibase.change-log=db/changelog/Change-Log.xml
quarkus.liquibase.default-schema-name=api

# Quarkus Dev Services handles the container automatically.
# No DB URL or credentials are needed for tests;
# Quarkus discovers the driver and starts the correct container.
quarkus.datasource.enabled=false
quarkus.hibernate-orm.enabled=false
quarkus.hibernate-orm.blocking=false
quarkus.datasource.reactive.enabled=false
quarkus.http.test-port=0
quarkus.grpc.server.port=0

mp.jwt.verify.issuer=${API_SERVER_CORE_VERIFY_ISSUER:${application.verify-issuer}}
smallrye.jwt.time-to-live=-1
mp.jwt.verify.secret=12345678901234567890123456789012
mp.jwt.verify.algorithm=HS256
smallrye.jwt.verify.secretkey=12345678901234567890123456789012