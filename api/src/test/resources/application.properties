# Enable Liquibase to run on startup
quarkus.liquibase.migrate-at-start=true
quarkus.hibernate-orm.database.generation=none
quarkus.liquibase.change-log=db/changelog/Change-Log.xml
quarkus.liquibase.default-schema-name=api

# Quarkus Dev Services handles the container automatically.
# No DB URL or credentials are needed for tests;
# Quarkus discovers the driver and starts the correct container.
quarkus.datasource.username=test
quarkus.datasource.password=test
quarkus.http.test-port=0
quarkus.grpc.server.port=0
