name: Gradle / JDK 21 CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Gradle
        run: ./gradlew build -xtest

      - name: Run Tests with Testcontainers
        # Здесь можно добавить шаги для запуска тестов, использующих Testcontainers
        # Например, запуск контейнеров для баз данных или других зависимостей
        run: ./gradlew test
